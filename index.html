// ── URL HASH STATE ──
function compressState(obj) {
  try {
    const json = JSON.stringify(obj);
    const bytes = new TextEncoder().encode(json);
    let binary = '';
    for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
    return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  } catch { return null; }
}
function decompressState(str) {
  try {
    const padded = str.replace(/-/g, '+').replace(/_/g, '/');
    const binary = atob(padded);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const json = new TextDecoder().decode(bytes);
    return JSON.parse(json);
  } catch { return null; }
}
function writeHash(state) {
  const encoded = compressState(state);
  if (encoded) { try { window.history.replaceState(null, '', '#' + encoded); } catch {} }
}
function readHash() {
  const hash = window.location.hash.slice(1);
  if (!hash) return null;
  return decompressState(hash);
}

// ── COMPUTATION ──
function applyRole(path, roleKey) {
  if (!path.roles?.[roleKey]) return path;
  const r = path.roles[roleKey];
  return { ...path, cashComp: path.cashComp.map(v => Math.round(v * r.cashAdj)), equityGrant: path.equityGrant.map(v => Math.round(v * r.eqAdj)) };
}
function df(y) { return Math.pow(1 + DISCOUNT_RATE, y); }
function exitOptionNPV(exitComp, departY, horizon) {
  let npv = 0;
  for (let t = departY; t < horizon; t++) npv += exitComp[t] / Math.pow(1 + DISCOUNT_RATE, t - departY);
  return npv;
}
function computeEV(path, horizon) {
  let total = 0;
  for (let y = 0; y < horizon; y++) {
    const s = path.stayProb[y], prevS = y === 0 ? 1 : path.stayProb[y - 1];
    const eq = path.equityGrant[y] * path.equityMultiplier[y] * (1 - path.equityZeroProb[y]);
    let f = 0;
    if (path.founderEquity && path.founderEqProb) f = s * path.founderEquity[y] * path.founderEqProb[y];
    const yearVal = s * (path.cashComp[y] + eq) + (prevS - s) * exitOptionNPV(path.exitComp, y, horizon) + f;
    total += yearVal / df(y);
  }
  return total;
}
function computeBreakdown(path, horizon) {
  let cC = 0, cE = 0;
  const data = [];
  for (let y = 0; y < horizon; y++) {
    const s = path.stayProb[y], prevS = y === 0 ? 1 : path.stayProb[y - 1];
    const cashRaw = s * path.cashComp[y] + (prevS - s) * exitOptionNPV(path.exitComp, y, horizon);
    const eqRaw = s * path.equityGrant[y] * path.equityMultiplier[y] * (1 - path.equityZeroProb[y]);
    let fRaw = 0;
    if (path.founderEquity && path.founderEqProb) fRaw = s * path.founderEquity[y] * path.founderEqProb[y];
    const d = df(y);
    const cash = cashRaw / d, eq = (eqRaw + fRaw) / d;
    cC += cash; cE += eq;
    data.push({ year: `Y${y + 1}`, cash: Math.round(cash), equity: Math.round(eq), cumCash: Math.round(cC), cumEquity: Math.round(cE), cumTotal: Math.round(cC + cE) });
  }
  return data;
}
function fmtK(v) { return Math.abs(v) >= 1000 ? `$${(v / 1000).toFixed(1)}M` : `$${Math.round(v)}K`; }

// ── UI ──

function MethodologyPanel() {
  const [open, setOpen] = useState(false);
  const sec = { color: "#bbb", fontWeight: 700, fontSize: 12.5, marginTop: 16, marginBottom: 6, letterSpacing: 0.3 };
  const par = { color: "#888", fontSize: 12.5, lineHeight: 1.75, marginBottom: 6 };
  const code = { fontFamily: "'Space Mono', monospace", color: "#bbb", background: "rgba(255,255,255,0.04)", padding: "1px 6px", borderRadius: 3, fontSize: 11.5 };
  const bold = { color: "#bbb", fontWeight: 600 };
  return (<div style={{ background: "rgba(255,255,255,0.01)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: 10, padding: "14px 16px", marginTop: 16 }}>
    <div onClick={() => setOpen(!open)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" }}>
      <div>
        <div style={{ fontSize: 11, color: "#888", fontWeight: 700, letterSpacing: 0.5 }}>METHODOLOGY &amp; ASSUMPTIONS</div>
        <div style={{ fontSize: 11.5, color: "#555", marginTop: 3 }}>How EV is calculated, key assumptions, what's not captured. Click to expand.</div>
      </div>
      <span style={{ color: "#555", fontSize: 16, transform: open ? "rotate(180deg)" : "none", transition: "0.2s" }}>&#9662;</span>
    </div>
    {open && (<div style={{ marginTop: 8 }}>
      <div style={sec}>What this is</div>
      <div style={par}>A side-by-side comparison of the <span style={bold}>expected dollar value</span> of five career paths over a 5-, 7-, or 10-year horizon. Every dollar — on-path cash, on-path equity, and the value of your fallback job if you leave — is weighted by the probability it actually happens, then discounted back to today's dollars. The output is a single EV number per path, plus a year-by-year breakdown.</div>
      <div style={par}>It's a <span style={bold}>back-of-envelope</span>, not a forecast. The point is to surface the second-order effects that gut intuition misses — like "MBB pays $268K Y1, but 94% of people are gone by Y10."</div>

      <div style={sec}>Paths in this comparison</div>
      <div style={par}><span style={bold}>Consulting</span> — Blended MBB / Tier-2 (McKinsey, BCG, Bain, Oliver Wyman, Strategy&). Post-MBA Associate → EM → AP → Partner. All cash, no equity, brutal up-or-out.</div>
      <div style={par}><span style={bold}>Big Tech (Generalist)</span> — FAANG + high-growth public tech (Google, Meta, Nvidia, etc.). L5 → L7+ track. Stable cash + meaningful RSU grants that grow ~4× over the horizon in expectation.</div>
      <div style={par}><span style={bold}>High-Growth Startup</span> — Series B/C tier (Anthropic, Anduril, Scale, Databricks-stage). Competitive cash, large equity grants, real failure risk, massive upside if it works.</div>
      <div style={par}><span style={bold}>Corp Strategy / Finance</span> — F500 strategy, FP&A, corp dev. Stable cash + modest RSUs at public co's. Lower ceiling, much higher floor.</div>
      <div style={par}><span style={bold}>Found a Company</span> — VC-backed founder. Low salary, high attrition (~17% still running their company at Y10), equity as discrete liquidity events at funding milestones / exit.</div>

      <div style={sec}>The formula in plain English</div>
      <div style={par}>For each year on a path, EV is: <span style={bold}>(probability you're still on the path) × (cash + expected equity)</span> + <span style={bold}>(probability you've already left) × (NPV of your fallback job for the rest of the horizon)</span>. Each year's contribution is then discounted at 5%/yr. Sum across all years.</div>

      <div style={sec}>The math, for the curious</div>
      <div style={par}>For each year y from 0 to horizon-1:</div>
      <div style={{ ...par, paddingLeft: 12 }}>
        <span style={code}>year_value(y) = stay(y) × [cash(y) + grant(y) × mult(y) × (1 − P_zero(y))] + (stay(y−1) − stay(y)) × NPV_exit(y) + stay(y) × founder_event(y)</span>
      </div>
      <div style={{ ...par, paddingLeft: 12 }}>
        <span style={code}>total_EV = Σ year_value(y) / (1.05)^y</span>
      </div>
      <div style={par}>Where <span style={code}>NPV_exit(y)</span> is the present value (at year y) of following the exit-comp trajectory <span style={code}>exit_comp[y..horizon-1]</span> through the remaining years — i.e., your fallback comp grows year-over-year, just like your on-path comp does.</div>

      <div style={sec}>Key assumptions</div>
      <div style={par}><span style={bold}>5% annual discount rate</span>, applied uniformly to all dollars (on-path cash, on-path equity, exit fallback). Roughly the long-run real return on a balanced portfolio — a reasonable opportunity cost for "what else could this dollar earn." Pick a different rate by editing the source if you have one in mind.</div>
      <div style={par}><span style={bold}>Cash compensation</span> is all-in: base + performance bonus (at midpoint, not the conservative end) + signing bonus amortized into Y1. For consulting, the array reflects the Associate → EM → AP → Partner ladder; for tech, it includes target bonus.</div>
      <div style={par}><span style={bold}>Stay probability</span> is the fraction of a starting cohort still on that <span style={bold}>exact</span> path at year y — not "still in any career," but "still at this firm or company type." It captures voluntary attrition, layoffs, up-or-out cuts, and (for founders) company failure plus founder replacement.</div>
      <div style={par}><span style={bold}>Equity multiplier</span> represents the long-run expected value of $1 of equity granted in year y, by the time it's realized. A multiplier of 4× means an RSU grant is expected to be worth 4× face value when it pays out. The single multiplier here is the probability-weighted average of bear / base / bull scenarios — a more detailed scenario breakdown is on the roadmap.</div>
      <div style={par}><span style={bold}>P(eq=0)</span> is the probability the equity goes to zero — startup failure, severe drawdown, etc. Applied as <span style={code}>grant × mult × (1 − P_zero)</span>.</div>
      <div style={par}><span style={bold}>Exit role compensation</span> is the year-by-year fallback trajectory: what you'd earn each year if you'd left this path. Leave at Y3 → you start at exit_comp[3] and continue along exit_comp[4..9] for the rest of the horizon. Fallback comp grows with you, reflecting that ex-consultants, ex-Big-Tech, etc. continue to advance in their next careers.</div>
      <div style={par}><span style={bold}>Founder equity</span> is modeled as discrete liquidity events (Series A, growth round, exit) with a value and probability per year, rather than annual grants. Each year's expected payout = stay(y) × event_value(y) × event_prob(y).</div>
      <div style={par}><span style={bold}>Role adjustments</span> apply fixed cash and equity multipliers per role per path (e.g., a Chief of Staff at a startup gets 0.95× cash, 1.10× equity vs. a PM benchmark).</div>

      <div style={sec}>What's not captured</div>
      <div style={par}>Taxes (everything is pre-tax), cost of living, vesting cliffs and schedules, AMT on ISOs, illiquidity of private equity, correlation between market downturns and attrition (in reality these move together), non-financial value (network, learning, optionality), and the genuinely fat-tailed nature of startup outcomes — three averaged scenarios understate how binary early-stage outcomes are.</div>

      <div style={sec}>Data sources</div>
      <div style={par}>Compensation: Levels.fyi 2025 End of Year Pay Report, Carta State of Startup Compensation H1 2025, Management Consulted 2026 Salary Report, CaseLane McKinsey Salary 2025. Survival / attrition: BLS Establishment Age and Survival Data, CB Insights Venture Capital Funnel, HBR/Harvard Law founder replacement research. Equity multipliers: historical stock data (Nvidia, Meta, Cisco, Amazon), Index Ventures employee dilution benchmarks, Carta step-up multiples. Full citations in METHODOLOGY.md.</div>

      <div style={{ ...par, marginTop: 14, color: "#555", fontSize: 11, fontStyle: "italic" }}>Not financial advice. Every number is editable in the "Assumptions by path" section above — your config is encoded in the URL, so you can copy it and share your exact setup.</div>
    </div>)}
  </div>);
}

// ── MAIN APP ──
function App() {
  const initState = useRef(readHash());
  const init = initState.current;
  const [horizon, setHorizon] = useState(init?.horizon || 10);
  const [role, setRole] = useState(init?.role || "pm");
  const [paths, setPaths] = useState(init?.paths ? dc(init.paths) : dc(PRESETS));
  const [visible, setVisible] = useState(init?.visible || DEFAULT_VISIBLE);
  const [drill, setDrill] = useState(null);

  const allPathNames = Object.keys(paths);
  const togglePath = (name) => { setVisible(prev => prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name]); setDrill(null); };

  useEffect(() => { const t = setTimeout(() => writeHash({ horizon, role, paths, visible }), 500); return () => clearTimeout(t); }, [horizon, role, paths, visible]);

  const resetAll = useCallback(() => { setPaths(dc(PRESETS)); setVisible(DEFAULT_VISIBLE); setRole("pm"); setDrill(null); }, []);

  const filtered = useMemo(() => Object.fromEntries(Object.entries(paths).filter(([n]) => visible.includes(n))), [paths, visible]);

  const results = useMemo(() => Object.entries(filtered).map(([name, raw]) => {
    const p = raw.roles ? applyRole(raw, role) : raw;
    const bd = computeBreakdown(p, horizon);
    const last = bd[bd.length - 1];
    return { name, ev: computeEV(p, horizon), cashEV: last.cumCash, equityEV: last.cumEquity, color: raw.color, bd, hasRoles: !!raw.roles };
  }).sort((a, b) => b.ev - a.ev), [filtered, role, horizon]);

  const cumData = useMemo(() => {
    const all = {};
    Object.entries(filtered).forEach(([n, raw]) => { all[n] = computeBreakdown(raw.roles ? applyRole(raw, role) : raw, horizon); });
    return Array.from({ length: horizon }, (_, y) => {
      const pt = { year: `Y${y + 1}` };
      Object.entries(all).forEach(([n, d]) => { pt[n] = d[y].cumTotal; });
      return pt;
    });
  }, [filtered, role, horizon]);

  const maxEV = results[0];
  const pathColors = {}; results.forEach(r => pathColors[r.name] = r.color);
  const drillData = drill ? results.find(r => r.name === drill) : null;
  const cg = results.length <= 4 ? results.length : 4;

  return (<div style={{ fontFamily: "'DM Sans', sans-serif", background: "#08080d", color: "#e0e0e0", minHeight: "100vh", padding: "28px 20px" }}>
    <div style={{ maxWidth: 1060, margin: "0 auto" }}>
      <div style={{ marginBottom: 22 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>{["CAREER", "EV", "ANALYZER"].map((w, i) => <span key={w} style={{ fontFamily: "'Space Mono', monospace", fontSize: 12, color: i === 1 ? (maxEV?.color || "#6366F1") : "#444", letterSpacing: 3 }}>{w}</span>)}</div>
        <h1 style={{ fontSize: 26, fontWeight: 700, margin: 0, color: "#f0f0f0" }}>What's your career actually worth?</h1>
        <p style={{ color: "#666", fontSize: 13, marginTop: 8, maxWidth: 720, lineHeight: 1.65 }}>Expected value weights each year of comp by the probability you're still on that path, adds your fallback job's value if you've already left, and discounts everything to today's dollars at 5%/yr. Pick paths to compare, choose your role, click any card to drill in. Every assumption is editable below — your config is in the URL.</p>
      </div>

      <div style={{ display: "flex", gap: 18, marginBottom: 20, flexWrap: "wrap", alignItems: "flex-end" }}>
        <div><label style={{ display: "block", fontSize: 10, color: "#555", marginBottom: 6, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase" }}>Role Type</label><div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>{Object.entries(ROLE_LABELS).map(([k, l]) => <Btn key={k} active={role === k} onClick={() => setRole(k)} label={l} />)}</div></div>
        <div><label style={{ display: "block", fontSize: 10, color: "#555", marginBottom: 6, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase" }}>Horizon</label><div style={{ display: "flex", gap: 4 }}>{[5, 7, 10].map(h => <Btn key={h} active={horizon === h} onClick={() => setHorizon(h)} label={`${h}yr`} mono />)}</div></div>
      </div>

      <div style={{ marginBottom: 18 }}>
        <label style={{ display: "block", fontSize: 10, color: "#555", marginBottom: 6, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase" }}>Compare Paths</label>
        <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
          {allPathNames.map(name => {
            const pd = paths[name];
            const isOn = visible.includes(name);
            return <button key={name} onClick={() => togglePath(name)} style={{ padding: "5px 11px", fontSize: 11, fontWeight: 600, background: isOn ? `${pd.color}18` : "rgba(255,255,255,0.02)", border: isOn ? `1px solid ${pd.color}50` : "1px solid rgba(255,255,255,0.05)", borderRadius: 14, color: isOn ? pd.color : "#555", cursor: "pointer", transition: "all 0.15s" }}>{name}</button>;
          })}
        </div>
      </div>

      {[results.slice(0, cg), ...(results.length > cg ? [results.slice(cg)] : [])].map((row, ri) => (
        <div key={ri} style={{ display: "grid", gridTemplateColumns: `repeat(${row.length}, 1fr)`, gap: 8, marginBottom: 8 }}>
          {row.map((r, idx) => { const i = ri * cg + idx; return (
            <div key={r.name} onClick={() => setDrill(drill === r.name ? null : r.name)} style={{ background: i === 0 ? `linear-gradient(135deg, ${r.color}12, ${r.color}06)` : "rgba(255,255,255,0.015)", border: drill === r.name ? `1px solid ${r.color}60` : i === 0 ? `1px solid ${r.color}30` : "1px solid rgba(255,255,255,0.04)", borderRadius: 10, padding: "12px 14px", cursor: "pointer", transition: "0.2s", position: "relative" }}>
              {i === 0 && <div style={{ position: "absolute", top: 6, right: 8, fontSize: 8, fontWeight: 700, color: r.color, letterSpacing: 1.2, textTransform: "uppercase", fontFamily: "'Space Mono', monospace" }}>HIGHEST EV</div>}
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 5 }}><div style={{ width: 8, height: 8, borderRadius: "50%", background: r.color, flexShrink: 0 }} /><span style={{ fontSize: 10.5, color: "#999", fontWeight: 600 }}>{r.name}</span></div>
              <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 22, fontWeight: 700, color: i === 0 ? "#fff" : "#bbb" }}>{fmtK(r.ev)}</div>
              <div style={{ display: "flex", gap: 10, marginTop: 5, fontSize: 10 }}><span><span style={{ color: "#555" }}>Cash </span><span style={{ color: "#8B9DC3", fontFamily: "'Space Mono', monospace", fontWeight: 600 }}>{fmtK(r.cashEV)}</span></span>{r.equityEV > 0 && <span><span style={{ color: "#555" }}>Eq </span><span style={{ color: "#C4A265", fontFamily: "'Space Mono', monospace", fontWeight: 600 }}>{fmtK(r.equityEV)}</span></span>}</div>
              <div style={{ fontSize: 9.5, color: "#444", marginTop: 3 }}>Click to drill down &#8595;</div>
            </div>); })}
        </div>))}
      <div style={{ height: 12 }} />

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 20 }}>
        <div style={{ background: "rgba(255,255,255,0.015)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: 10, padding: "16px 12px 8px" }}>
          <div style={{ fontSize: 11, color: "#666", fontWeight: 700, marginBottom: 12, letterSpacing: 0.5 }}>EV: CASH vs EQUITY</div>
          <ResponsiveContainer width="100%" height={Math.max(200, results.length * 36)}><BarChart data={results} layout="vertical" margin={{ left: 8, right: 16 }}><CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.03)" horizontal={false} /><XAxis type="number" tickFormatter={fmtK} tick={{ fill: "#444", fontSize: 10, fontFamily: "'Space Mono', monospace" }} axisLine={false} tickLine={false} /><YAxis type="category" dataKey="name" width={160} tick={{ fill: "#999", fontSize: 10 }} axisLine={false} tickLine={false} /><Tooltip content={<TT />} cursor={{ fill: "rgba(255,255,255,0.02)" }} /><Bar dataKey="cashEV" name="Cash EV" stackId="a" fill="#6B7DB3" barSize={17} /><Bar dataKey="equityEV" name="Equity EV" stackId="a" fill="#C4A265" radius={[0, 4, 4, 0]} barSize={17} /></BarChart></ResponsiveContainer>
        </div>
        <div style={{ background: "rgba(255,255,255,0.015)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: 10, padding: "16px 12px 8px" }}>
          <div style={{ fontSize: 11, color: "#666", fontWeight: 700, marginBottom: 12, letterSpacing: 0.5 }}>CUMULATIVE EV OVER TIME</div>
          <ResponsiveContainer width="100%" height={Math.max(200, results.length * 36)}><AreaChart data={cumData} margin={{ left: 8, right: 16 }}><CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.03)" /><XAxis dataKey="year" tick={{ fill: "#444", fontSize: 10, fontFamily: "'Space Mono', monospace" }} axisLine={false} tickLine={false} /><YAxis tickFormatter={fmtK} tick={{ fill: "#444", fontSize: 10, fontFamily: "'Space Mono', monospace" }} axisLine={false} tickLine={false} /><Tooltip content={<TT />} />{Object.entries(pathColors).map(([n, c]) => <Area key={n} type="monotone" dataKey={n} stroke={c} fill={c} fillOpacity={0.05} strokeWidth={2} dot={false} />)}</AreaChart></ResponsiveContainer>
        </div>
      </div>

      {drillData && (<div style={{ background: "rgba(255,255,255,0.015)", border: `1px solid ${drillData.color}30`, borderRadius: 10, padding: "16px 14px 10px", marginBottom: 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}><div style={{ display: "flex", alignItems: "center", gap: 8 }}><div style={{ width: 10, height: 10, borderRadius: "50%", background: drillData.color }} /><span style={{ fontSize: 13, fontWeight: 700, color: "#ddd" }}>{drillData.name}</span><span style={{ fontSize: 11, color: "#555" }}>— Year-by-year cash vs equity EV (in today's dollars)</span></div><button onClick={() => setDrill(null)} style={{ fontSize: 11, color: "#666", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 5, padding: "4px 10px", cursor: "pointer" }}>Close</button></div>
        <ResponsiveContainer width="100%" height={185}><BarChart data={drillData.bd} margin={{ left: 8, right: 16 }}><CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.03)" /><XAxis dataKey="year" tick={{ fill: "#444", fontSize: 10, fontFamily: "'Space Mono', monospace" }} axisLine={false} tickLine={false} /><YAxis tickFormatter={fmtK} tick={{ fill: "#444", fontSize: 10, fontFamily: "'Space Mono', monospace" }} axisLine={false} tickLine={false} /><Tooltip content={<TT />} /><Bar dataKey="cash" name="Cash EV" stackId="a" fill="#6B7DB3" barSize={26} /><Bar dataKey="equity" name="Equity EV" stackId="a" fill="#C4A265" radius={[4, 4, 0, 0]} barSize={26} /></BarChart></ResponsiveContainer>
      </div>)}

      <div style={{ background: "rgba(255,255,255,0.01)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: 10, padding: "16px 14px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}><div><div style={{ fontSize: 11, color: "#666", fontWeight: 700, letterSpacing: 0.5 }}>ASSUMPTIONS BY PATH</div><div style={{ fontSize: 11, color: "#444", marginTop: 2 }}>Expand any path to tweak cash, equity, multipliers, survival rates, and exit comp.</div></div><button onClick={resetAll} style={{ fontSize: 11, fontWeight: 600, color: "#555", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 5, padding: "5px 12px", cursor: "pointer" }}>Reset defaults</button></div>
        {Object.entries(filtered).map(([n, p]) => <PathEditor key={n} name={n} path={p} color={p.color} onChange={np => setPaths(prev => ({ ...prev, [n]: np }))} />)}
      </div>

      <MethodologyPanel />
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
