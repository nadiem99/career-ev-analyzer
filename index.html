// ── URL HASH STATE ──
function compressState(obj) {
  try {
    const json = JSON.stringify(obj);
    const bytes = new TextEncoder().encode(json);
    let binary = '';
    for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
    return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  } catch { return null; }
}
function decompressState(str) {
  try {
    const padded = str.replace(/-/g, '+').replace(/_/g, '/');
    const binary = atob(padded);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const json = new TextDecoder().decode(bytes);
    return JSON.parse(json);
  } catch { return null; }
}
function writeHash(state) {
  const encoded = compressState(state);
  if (encoded) { try { window.history.replaceState(null, '', '#' + encoded); } catch {} }
}
function readHash() {
  const hash = window.location.hash.slice(1);
  if (!hash) return null;
  return decompressState(hash);
}

// ── COMPUTATION ──
function applyRole(path, roleKey) {
  if (!path.roles?.[roleKey]) return path;
  const r = path.roles[roleKey];
  return { ...path, cashComp: path.cashComp.map(v => Math.round(v * r.cashAdj)), equityGrant: path.equityGrant.map(v => Math.round(v * r.eqAdj)) };
}
const EXIT_DISCOUNT_RATE = 0.05;
function exitOptionNPV(exitComp, departY, horizon) {
  let npv = 0;
  for (let t = departY; t < horizon; t++) npv += exitComp[departY] / Math.pow(1 + EXIT_DISCOUNT_RATE, t - departY);
  return npv;
}
function computeSimpleEV(path, horizon) {
  let total = 0;
  for (let y = 0; y < horizon; y++) {
    const s = path.stayProb[y], prevS = y === 0 ? 1 : path.stayProb[y - 1];
    const eq = path.equityGrant[y] * path.equityMultiplier[y] * (1 - path.equityZeroProb[y]);
    let f = 0;
    if (path.founderEquity && path.founderEqProb) f = s * path.founderEquity[y] * path.founderEqProb[y];
    total += s * (path.cashComp[y] + eq) + (prevS - s) * exitOptionNPV(path.exitComp, y, horizon) + f;
  }
  return total;
}
function computeSimpleBreakdown(path, horizon) {
  let cC = 0, cE = 0;
  const data = [];
  for (let y = 0; y < horizon; y++) {
    const s = path.stayProb[y], prevS = y === 0 ? 1 : path.stayProb[y - 1];
    const cash = s * path.cashComp[y] + (prevS - s) * exitOptionNPV(path.exitComp, y, horizon);
    const eq = s * path.equityGrant[y] * path.equityMultiplier[y] * (1 - path.equityZeroProb[y]);
    let f = 0;
    if (path.founderEquity && path.founderEqProb) f = s * path.founderEquity[y] * path.founderEqProb[y];
    cC += cash; cE += eq + f;
    data.push({ year: `Y${y + 1}`, cash: Math.round(cash), equity: Math.round(eq + f), cumCash: Math.round(cC), cumEquity: Math.round(cE), cumTotal: Math.round(cC + cE) });
  }
  return data;
}
function computeDetailedEV(rawPath, horizon, role) {
  const p = rawPath.roles?.[role] ? applyRole(rawPath, role) : rawPath;
  let total = 0, cashTotal = 0, eqTotal = 0;
  const yearly = [];
  for (let y = 0; y < horizon; y++) {
    const s = p.stayProb[y], prevS = y === 0 ? 1 : p.stayProb[y - 1];
    const cashEV = s * p.cashComp[y] + (prevS - s) * exitOptionNPV(p.exitComp, y, horizon);
    let eqEV = 0;
    if (p.scenarios) { for (const sc of Object.values(p.scenarios)) { eqEV += s * p.equityGrant[y] * sc.mult[y] * sc.prob[y]; } }
    let fEV = 0;
    if (p.founderEquity && p.founderEqProb) fEV = s * p.founderEquity[y] * p.founderEqProb[y];
    cashTotal += cashEV; eqTotal += eqEV + fEV; total += cashEV + eqEV + fEV;
    yearly.push({ year: `Y${y + 1}`, cash: Math.round(cashEV), equity: Math.round(eqEV + fEV), cumCash: Math.round(cashTotal), cumEquity: Math.round(eqTotal), cumTotal: Math.round(total) });
  }
  return { total, cashTotal, eqTotal, yearly };
}
function fmtK(v) { return Math.abs(v) >= 1000 ? `$${(v / 1000).toFixed(1)}M` : `$${Math.round(v)}K`; }

// ── UI ──
const TT = ({ active, payload, label }) => {
  if (!active || !payload?.length) return null;
  return (<div style={{ background: "rgba(10,10,16,0.97)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 8, padding: "10px 14px", fontSize: 12, fontFamily: "'DM Sans', sans-serif" }}><div style={{ color: "#666", marginBottom: 4, fontWeight: 600, fontSize: 11 }}>{label}</div>{payload.map((p, i) => (<div key={i} style={{ display: "flex", gap: 12, justifyContent: "space-between", padding: "1px 0" }}><span style={{ color: "#aaa" }}>{p.name}</span><span style={{ fontWeight: 700, fontFamily: "'Space Mono', monospace", fontSize: 11, color: p.color || p.fill }}>{fmtK(p.value)}</span></div>))}</div>);
};

function Btn({ active, onClick, label, mono }) {
  return <button onClick={onClick} style={{ padding: "7px 13px", fontSize: 12, fontWeight: 600, background: active ? "rgba(255,255,255,0.09)" : "rgba(255,255,255,0.02)", border: active ? "1px solid rgba(255,255,255,0.18)" : "1px solid rgba(255,255,255,0.05)", borderRadius: 6, color: active ? "#fff" : "#666", cursor: "pointer", transition: "all 0.15s", fontFamily: mono ? "'Space Mono', monospace" : "'DM Sans', sans-serif" }}>{label}</button>;
}

function GridEditor({ label, arr, scale = 1, step = 1, onChange }) {
  return (<Fragment><div style={{ color: "#888", textAlign: "right", paddingRight: 8, whiteSpace: "nowrap", fontSize: 10.5 }}>{label}</div>{YEARS.map((_, i) => (<input key={i} type="number" step={step} value={Math.round(arr[i] * scale * 100) / 100} onChange={e => { const v = [...arr]; v[i] = Number(e.target.value) / scale; onChange(v); }} style={{ width: "100%", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 4, color: "#ccc", textAlign: "center", padding: "5px 2px", fontFamily: "'Space Mono', monospace", fontSize: 11, outline: "none" }} />))}</Fragment>);
}

function PathEditor({ name, path, onChange, color, isDetailed }) {
  const [open, setOpen] = useState(false);
  const update = (key, val) => onChange({ ...path, [key]: val });
  const updateScenario = (sc, key, val) => {
    const s = dc(path.scenarios);
    s[sc][key] = val;
    if (key === "prob") {
      const others = Object.keys(s).filter(k => k !== sc);
      for (let i = 0; i < val.length; i++) {
        const newVal = val[i];
        const othersSum = others.reduce((sum, k) => sum + s[k].prob[i], 0);
        const remaining = Math.max(0, 1 - newVal);
        if (othersSum > 0) {
          others.forEach(k => { s[k].prob[i] = s[k].prob[i] / othersSum * remaining; });
        } else {
          others.forEach(k => { s[k].prob[i] = remaining / others.length; });
        }
      }
    }
    onChange({ ...path, scenarios: s });
  };
  return (<div style={{ background: "rgba(255,255,255,0.02)", border: `1px solid ${color}18`, borderLeft: `3px solid ${color}`, borderRadius: 8, padding: "12px 16px", marginBottom: 8 }}>
    <div onClick={() => setOpen(!open)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}><div style={{ width: 10, height: 10, borderRadius: "50%", background: color, boxShadow: `0 0 8px ${color}40` }} /><span style={{ fontWeight: 600, fontSize: 14, color: "#ddd" }}>{name}</span></div>
      <span style={{ color: "#555", fontSize: 16, transform: open ? "rotate(180deg)" : "none", transition: "0.2s" }}>&#9662;</span>
    </div>
    <div style={{ color: "#666", fontSize: 12, marginTop: 4, marginLeft: 20 }}>{path.description}</div>
    {open && (<div style={{ marginTop: 14, overflowX: "auto" }}><div style={{ display: "grid", gridTemplateColumns: "110px repeat(10, 1fr)", gap: "5px 5px", fontSize: 11, alignItems: "center", minWidth: 640 }}>
      <div style={{ color: "#555", fontWeight: 600, textAlign: "right", paddingRight: 8 }}>Year</div>
      {YEARS.map(y => <div key={y} style={{ color: "#666", textAlign: "center", fontFamily: "'Space Mono', monospace", fontWeight: 700 }}>{y}</div>)}
      <GridEditor label="Cash ($K)" arr={path.cashComp} onChange={v => update("cashComp", v)} />
      {!isDetailed && path.hasEquity !== false && path.equityGrant && path.equityMultiplier && <Fragment><GridEditor label="Eq. Grant ($K)" arr={path.equityGrant} onChange={v => update("equityGrant", v)} /><GridEditor label="Eq. Mult." arr={path.equityMultiplier} step={0.1} onChange={v => update("equityMultiplier", v)} /><GridEditor label={"Eq.\u21920 %"} arr={path.equityZeroProb} scale={100} onChange={v => update("equityZeroProb", v)} /></Fragment>}
      {isDetailed && path.scenarios && <Fragment><GridEditor label="Eq. Grant ($K)" arr={path.equityGrant} onChange={v => update("equityGrant", v)} />
        {Object.entries(path.scenarios).map(([k, sc]) => (<Fragment key={k}><GridEditor label={`${k.charAt(0).toUpperCase() + k.slice(1)} Mult.`} arr={sc.mult} step={0.1} onChange={v => updateScenario(k, "mult", v)} /><GridEditor label={`${k.charAt(0).toUpperCase() + k.slice(1)} Prob %`} arr={sc.prob} scale={100} onChange={v => updateScenario(k, "prob", v)} /></Fragment>))}</Fragment>}
      <GridEditor label="Stay %" arr={path.stayProb} scale={100} onChange={v => update("stayProb", v)} />
      <GridEditor label="Exit Role ($K/yr)" arr={path.exitComp} onChange={v => update("exitComp", v)} />
      {path.isFounder && <Fragment><GridEditor label={`${path.carryLabel || "Liq. Event"} ($K)`} arr={path.founderEquity} onChange={v => update("founderEquity", v)} /><GridEditor label={`${path.carryLabel || "Liq."} Prob %`} arr={path.founderEqProb} scale={100} onChange={v => update("founderEqProb", v)} /></Fragment>}
    </div></div>)}
  </div>);
}

// ── MAIN APP ──
function App() {
  const initState = useRef(readHash());
  const init = initState.current;
  const [mode, setMode] = useState(init?.mode || "simple");
  const [horizon, setHorizon] = useState(init?.horizon || 10);
  const [role, setRole] = useState(init?.role || "pm");
  const [simplePaths, setSimplePaths] = useState(init?.simplePaths ? dc(init.simplePaths) : dc(SIMPLE_PRESETS.paths));
  const [detailedPaths, setDetailedPaths] = useState(init?.detailedPaths ? dc(init.detailedPaths) : dc(DETAILED_PRESETS));
  const [simpleVisible, setSimpleVisible] = useState(init?.simpleVisible || DEFAULT_SIMPLE_VISIBLE);
  const [detailedVisible, setDetailedVisible] = useState(init?.detailedVisible || DEFAULT_DETAILED_VISIBLE);
  const [drill, setDrill] = useState(null);

  const visible = mode === "simple" ? simpleVisible : detailedVisible;
  const setVisible = mode === "simple" ? setSimpleVisible : setDetailedVisible;
  const allPathNames = mode === "simple" ? Object.keys(simplePaths) : Object.keys(detailedPaths);
  const togglePath = (name) => { setVisible(prev => prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name]); setDrill(null); };

  useEffect(() => { const t = setTimeout(() => writeHash({ mode, horizon, role, simplePaths, detailedPaths, simpleVisible, detailedVisible }), 500); return () => clearTimeout(t); }, [mode, horizon, role, simplePaths, detailedPaths, simpleVisible, detailedVisible]);

  const resetAll = useCallback(() => { setSimplePaths(dc(SIMPLE_PRESETS.paths)); setDetailedPaths(dc(DETAILED_PRESETS)); setSimpleVisible(DEFAULT_SIMPLE_VISIBLE); setDetailedVisible(DEFAULT_DETAILED_VISIBLE); setDrill(null); }, []);

  const filteredSimple = useMemo(() => Object.fromEntries(Object.entries(simplePaths).filter(([n]) => simpleVisible.includes(n))), [simplePaths, simpleVisible]);
  const filteredDetailed = useMemo(() => Object.fromEntries(Object.entries(detailedPaths).filter(([n]) => detailedVisible.includes(n))), [detailedPaths, detailedVisible]);

  const simpleResults = useMemo(() => Object.entries(filteredSimple).map(([name, raw]) => { const p = raw.roles ? applyRole(raw, role) : raw; const bd = computeSimpleBreakdown(p, horizon); const last = bd[bd.length - 1]; return { name, ev: computeSimpleEV(p, horizon), cashEV: last.cumCash, equityEV: last.cumEquity, color: raw.color, bd }; }).sort((a, b) => b.ev - a.ev), [filteredSimple, role, horizon]);
  const simpleCum = useMemo(() => { const all = {}; Object.entries(filteredSimple).forEach(([n, raw]) => { all[n] = computeSimpleBreakdown(raw.roles ? applyRole(raw, role) : raw, horizon); }); return Array.from({ length: horizon }, (_, y) => { const pt = { year: `Y${y + 1}` }; Object.entries(all).forEach(([n, d]) => { pt[n] = d[y].cumTotal; }); return pt; }); }, [filteredSimple, role, horizon]);
  const detailedResults = useMemo(() => Object.entries(filteredDetailed).map(([name, raw]) => { const res = computeDetailedEV(raw, horizon, role); return { name, ev: res.total, cashEV: Math.round(res.cashTotal), equityEV: Math.round(res.eqTotal), color: raw.color, yearly: res.yearly }; }).sort((a, b) => b.ev - a.ev), [filteredDetailed, role, horizon]);
  const detailedCum = useMemo(() => { const all = {}; Object.entries(filteredDetailed).forEach(([n, raw]) => { all[n] = computeDetailedEV(raw, horizon, role).yearly; }); return Array.from({ length: horizon }, (_, y) => { const pt = { year: `Y${y + 1}` }; Object.entries(all).forEach(([n, d]) => { pt[n] = d[y].cumTotal; }); return pt; }); }, [filteredDetailed, role, horizon]);

  const results = mode === "simple" ? simpleResults : detailedResults;
  const cumData = mode === "simple" ? simpleCum : detailedCum;
  const maxEV = results[0]; const pathColors = {}; results.forEach(r => pathColors[r.name] = r.color);
  const drillData = drill ? results.find(r => r.name === drill) : null;
  const cg = results.length <= 4 ? results.length : 4;

  return (<div style={{ fontFamily: "'DM Sans', sans-serif", background: "#08080d", color: "#e0e0e0", minHeight: "100vh", padding: "28px 20px" }}>
    <div style={{ maxWidth: 1060, margin: "0 auto" }}>
      <div style={{ marginBottom: 22 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>{["CAREER", "EV", "ANALYZER"].map((w, i) => <span key={w} style={{ fontFamily: "'Space Mono', monospace", fontSize: 12, color: i === 1 ? (maxEV?.color || "#6366F1") : "#444", letterSpacing: 3 }}>{w}</span>)}</div>
        <h1 style={{ fontSize: 26, fontWeight: 700, margin: 0, color: "#f0f0f0" }}>What's your career actually worth?</h1>
        <p style={{ color: "#555", fontSize: 13, marginTop: 8, maxWidth: 680, lineHeight: 1.65 }}>Expected value weights each outcome by its probability. <strong style={{ color: "#777" }}>Simple</strong> uses a single equity multiplier. <strong style={{ color: "#777" }}>Detailed</strong> adds bear/base/bull scenarios and splits tech/startups by stage. Select which paths to compare below.</p>
      </div>

      <div style={{ display: "flex", gap: 18, marginBottom: 20, flexWrap: "wrap", alignItems: "flex-end" }}>
        <div><label style={{ display: "block", fontSize: 10, color: "#555", marginBottom: 6, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase" }}>View</label><div style={{ display: "flex", gap: 4 }}><Btn active={mode === "simple"} onClick={() => { setMode("simple"); setDrill(null); }} label="Simple" /><Btn active={mode === "detailed"} onClick={() => { setMode("detailed"); setDrill(null); }} label="Detailed" /></div></div>
        <div><label style={{ display: "block", fontSize: 10, color: "#555", marginBottom: 6, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase" }}>Role Type</label><div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>{Object.entries(ROLE_LABELS).map(([k, l]) => <Btn key={k} active={role === k} onClick={() => setRole(k)} label={l} />)}</div></div>
        <div><label style={{ display: "block", fontSize: 10, color: "#555", marginBottom: 6, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase" }}>Horizon</label><div style={{ display: "flex", gap: 4 }}>{[5, 7, 10].map(h => <Btn key={h} active={horizon === h} onClick={() => setHorizon(h)} label={`${h}yr`} mono />)}</div></div>
      </div>

      <div style={{ marginBottom: 18 }}>
        <label style={{ display: "block", fontSize: 10, color: "#555", marginBottom: 6, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase" }}>Compare Paths</label>
        <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
          {allPathNames.map(name => {
            const pathData = mode === "simple" ? simplePaths[name] : detailedPaths[name];
            const isOn = visible.includes(name);
            return <button key={name} onClick={() => togglePath(name)} style={{ padding: "5px 11px", fontSize: 11, fontWeight: 600, background: isOn ? `${pathData.color}18` : "rgba(255,255,255,0.02)", border: isOn ? `1px solid ${pathData.color}50` : "1px solid rgba(255,255,255,0.05)", borderRadius: 14, color: isOn ? pathData.color : "#555", cursor: "pointer", transition: "all 0.15s" }}>{name}</button>;
          })}
        </div>
      </div>

      {[results.slice(0, cg), ...(results.length > cg ? [results.slice(cg)] : [])].map((row, ri) => (
        <div key={ri} style={{ display: "grid", gridTemplateColumns: `repeat(${row.length}, 1fr)`, gap: 8, marginBottom: 8 }}>
          {row.map((r, idx) => { const i = ri * cg + idx; return (
            <div key={r.name} onClick={() => setDrill(drill === r.name ? null : r.name)} style={{ background: i === 0 ? `linear-gradient(135deg, ${r.color}12, ${r.color}06)` : "rgba(255,255,255,0.015)", border: drill === r.name ? `1px solid ${r.color}60` : i === 0 ? `1px solid ${r.color}30` : "1px solid rgba(255,255,255,0.04)", borderRadius: 10, padding: "12px 14px", cursor: "pointer", transition: "0.2s", position: "relative" }}>
              {i === 0 && <div style={{ position: "absolute", top: 6, right: 8, fontSize: 8, fontWeight: 700, color: r.color, letterSpacing: 1.2, textTransform: "uppercase", fontFamily: "'Space Mono', monospace" }}>HIGHEST EV</div>}
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 5 }}><div style={{ width: 8, height: 8, borderRadius: "50%", background: r.color, flexShrink: 0 }} /><span style={{ fontSize: 10.5, color: "#999", fontWeight: 600 }}>{r.name}</span></div>
              <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 22, fontWeight: 700, color: i === 0 ? "#fff" : "#bbb" }}>{fmtK(r.ev)}</div>
              <div style={{ display: "flex", gap: 10, marginTop: 5, fontSize: 10 }}><span><span style={{ color: "#555" }}>Cash </span><span style={{ color: "#8B9DC3", fontFamily: "'Space Mono', monospace", fontWeight: 600 }}>{fmtK(r.cashEV)}</span></span>{r.equityEV > 0 && <span><span style={{ color: "#555" }}>Eq </span><span style={{ color: "#C4A265", fontFamily: "'Space Mono', monospace", fontWeight: 600 }}>{fmtK(r.equityEV)}</span></span>}</div>
              <div style={{ fontSize: 9.5, color: "#444", marginTop: 3 }}>Click to drill down &#8595;</div>
            </div>); })}
        </div>))}
      <div style={{ height: 12 }} />

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 20 }}>
        <div style={{ background: "rgba(255,255,255,0.015)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: 10, padding: "16px 12px 8px" }}>
          <div style={{ fontSize: 11, color: "#666", fontWeight: 700, marginBottom: 12, letterSpacing: 0.5 }}>EV: CASH vs EQUITY</div>
          <ResponsiveContainer width="100%" height={Math.max(200, results.length * 36)}><BarChart data={results} layout="vertical" margin={{ left: 8, right: 16 }}><CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.03)" horizontal={false} /><XAxis type="number" tickFormatter={fmtK} tick={{ fill: "#444", fontSize: 10, fontFamily: "'Space Mono', monospace" }} axisLine={false} tickLine={false} /><YAxis type="category" dataKey="name" width={160} tick={{ fill: "#999", fontSize: 10 }} axisLine={false} tickLine={false} /><Tooltip content={<TT />} cursor={{ fill: "rgba(255,255,255,0.02)" }} /><Bar dataKey="cashEV" name="Cash EV" stackId="a" fill="#6B7DB3" barSize={17} /><Bar dataKey="equityEV" name="Equity EV" stackId="a" fill="#C4A265" radius={[0, 4, 4, 0]} barSize={17} /></BarChart></ResponsiveContainer>
        </div>
        <div style={{ background: "rgba(255,255,255,0.015)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: 10, padding: "16px 12px 8px" }}>
          <div style={{ fontSize: 11, color: "#666", fontWeight: 700, marginBottom: 12, letterSpacing: 0.5 }}>CUMULATIVE EV OVER TIME</div>
          <ResponsiveContainer width="100%" height={Math.max(200, results.length * 36)}><AreaChart data={cumData} margin={{ left: 8, right: 16 }}><CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.03)" /><XAxis dataKey="year" tick={{ fill: "#444", fontSize: 10, fontFamily: "'Space Mono', monospace" }} axisLine={false} tickLine={false} /><YAxis tickFormatter={fmtK} tick={{ fill: "#444", fontSize: 10, fontFamily: "'Space Mono', monospace" }} axisLine={false} tickLine={false} /><Tooltip content={<TT />} />{Object.entries(pathColors).map(([n, c]) => <Area key={n} type="monotone" dataKey={n} stroke={c} fill={c} fillOpacity={0.05} strokeWidth={2} dot={false} />)}</AreaChart></ResponsiveContainer>
        </div>
      </div>

      {drillData && (<div style={{ background: "rgba(255,255,255,0.015)", border: `1px solid ${drillData.color}30`, borderRadius: 10, padding: "16px 14px 10px", marginBottom: 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}><div style={{ display: "flex", alignItems: "center", gap: 8 }}><div style={{ width: 10, height: 10, borderRadius: "50%", background: drillData.color }} /><span style={{ fontSize: 13, fontWeight: 700, color: "#ddd" }}>{drillData.name}</span><span style={{ fontSize: 11, color: "#555" }}>— Year-by-year cash vs equity EV</span></div><button onClick={() => setDrill(null)} style={{ fontSize: 11, color: "#666", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 5, padding: "4px 10px", cursor: "pointer" }}>Close</button></div>
        <ResponsiveContainer width="100%" height={185}><BarChart data={drillData.yearly || drillData.bd} margin={{ left: 8, right: 16 }}><CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.03)" /><XAxis dataKey="year" tick={{ fill: "#444", fontSize: 10, fontFamily: "'Space Mono', monospace" }} axisLine={false} tickLine={false} /><YAxis tickFormatter={fmtK} tick={{ fill: "#444", fontSize: 10, fontFamily: "'Space Mono', monospace" }} axisLine={false} tickLine={false} /><Tooltip content={<TT />} /><Bar dataKey="cash" name="Cash EV" stackId="a" fill="#6B7DB3" barSize={26} /><Bar dataKey="equity" name="Equity EV" stackId="a" fill="#C4A265" radius={[4, 4, 0, 0]} barSize={26} /></BarChart></ResponsiveContainer>
        {mode === "detailed" && detailedPaths[drillData.name]?.scenarios && (<div style={{ display: "flex", gap: 16, marginTop: 8, fontSize: 11, color: "#555", paddingLeft: 4, flexWrap: "wrap" }}>{Object.entries(detailedPaths[drillData.name].scenarios).map(([k, sc]) => (<span key={k}><span style={{ color: k === "bear" ? "#EF4444" : k === "bull" ? "#10B981" : "#F59E0B" }}>{sc.label}</span>{" "}Y{horizon}: <strong style={{ fontFamily: "'Space Mono', monospace", color: "#aaa" }}>{sc.mult[horizon - 1]}× @ {Math.round(sc.prob[horizon - 1] * 100)}%</strong></span>))}</div>)}
      </div>)}

      <div style={{ background: "rgba(255,255,255,0.01)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: 10, padding: "16px 14px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}><div><div style={{ fontSize: 11, color: "#666", fontWeight: 700, letterSpacing: 0.5 }}>ASSUMPTIONS</div><div style={{ fontSize: 11, color: "#444", marginTop: 2 }}>{mode === "simple" ? "Expand to tweak cash, equity, multipliers, survival rates, and exit role comp" : "Expand to tweak cash, equity grants, bear/base/bull scenarios, and exit role comp"}</div></div><button onClick={resetAll} style={{ fontSize: 11, fontWeight: 600, color: "#555", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 5, padding: "5px 12px", cursor: "pointer" }}>Reset defaults</button></div>
        {mode === "simple" ? Object.entries(filteredSimple).map(([n, p]) => <PathEditor key={n} name={n} path={p} color={p.color} onChange={np => setSimplePaths(prev => ({ ...prev, [n]: np }))} isDetailed={false} />) : Object.entries(filteredDetailed).map(([n, p]) => <PathEditor key={n} name={n} path={p} color={p.color} onChange={np => setDetailedPaths(prev => ({ ...prev, [n]: np }))} isDetailed={true} />)}
      </div>

      <div style={{ marginTop: 18, padding: "12px 0", borderTop: "1px solid rgba(255,255,255,0.04)" }}>
        <div style={{ fontSize: 11, color: "#3a3a3a", lineHeight: 1.75, maxWidth: 760 }}>
          <strong style={{ color: "#555" }}>Exit Role Comp:</strong> Shows annual comp in your next-best role if you leave. The model discounts the full outside option at 5%/yr to compute NPV at departure — e.g., an EM leaving MBB earns $350K+/yr in corp strat, valued as a discounted annuity over remaining years.<br /><br />
          <strong style={{ color: "#555" }}>Simple:</strong> EV = P(stay) × [cash + grant × mult × P(eq&#8800;0)] + P(leave) × NPV(exit comp, 5% discount).<br />
          <strong style={{ color: "#555" }}>Detailed:</strong> Replaces single multiplier with bear/base/bull. EV = P(stay) × [cash + grant × &#931;(scenario_mult × scenario_prob)] + P(leave) × NPV(exit comp, 5% discount).<br /><br />
          <strong style={{ color: "#555" }}>Benchmarks:</strong> MBB ~$246K Y1 TC. IB ~$225K Y1 all-in. PE ~$350K Y1 + carry from Y5. VC ~$175K Y1 + carry from Y7. FAANG L5 ~$390K TC. Corp strat ~$195K TC. Cash = base + bonus.<br />
          <strong style={{ color: "#555" }}>Not captured:</strong> Discounting on primary path earnings, taxes, cost of living, vesting schedules, non-financial value.
        </div>
      </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
